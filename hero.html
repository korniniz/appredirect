<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 กัน Dark mode override -->
<meta name="color-scheme" content="light">

<style>
  :root {
    color-scheme: light;
  }

  body {
    margin: 0;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    background: transparent !important;
    color: #ffffff !important;
  }

  .hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
  }

  .left {
    display: flex;
    flex-direction: column;
  }

  .greeting {
    font-size: 28px;
    font-weight: 600;
    color: #ffffff !important;
    letter-spacing: 0.2px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.25); /* 🔥 อ่านชัด */
  }

  .date {
    font-size: 13px;
    color: rgba(255,255,255,0.85) !important;
    margin-top: 4px;
  }

  .weather {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .temp {
    font-size: 15px;
    font-weight: 500;
    color: #ffffff !important;
  }

  .city {
    font-size: 12px;
    color: rgba(255,255,255,0.75) !important;
  }

  /* 🔥 กัน dark mode แทรก */
  @media (prefers-color-scheme: dark) {
    body {
      color: #ffffff !important;
      background: transparent !important;
    }
  }
</style>
</head>

<body>

<div class="hero">
  <div class="left">
    <div class="greeting" id="greeting"></div>
    <div class="date" id="date"></div>
  </div>

  <div class="weather">
    <div>🌤️</div>
    <div>
      <div class="temp" id="temp">--°C</div>
      <div class="city">Bangkok</div>
    </div>
  </div>
</div>

<script>
  const now = new Date();

  // Greeting
  let greeting = "Good Morning";
  const hour = now.getHours();

  if (hour >= 12 && hour < 17) greeting = "Good Afternoon";
  else if (hour >= 17) greeting = "Good Evening";

  // Date
  const options = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
  const formattedDate = now.toLocaleDateString('en-GB', options);

  document.getElementById("greeting").innerText = greeting;
  document.getElementById("date").innerText = formattedDate;

  // Weather (free API)
  fetch("https://api.open-meteo.com/v1/forecast?latitude=13.75&longitude=100.50&current_weather=true")
    .then(res => res.json())
    .then(data => {
      document.getElementById("temp").innerText = data.current_weather.temperature + "°C";
    })
    .catch(() => {
      document.getElementById("temp").innerText = "30°C";
    });
</script>

</body>
</html>
