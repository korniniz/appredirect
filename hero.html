<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="color-scheme" content="light">

<style>
  :root {
    color-scheme: light;
  }

  body {
    margin: 0;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    background: transparent !important;
    color: #ffffff;
  }

  .hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
  }

  /* LEFT SIDE */
  .left {
    display: flex;
    flex-direction: column;
  }

  .greeting {
    font-size: 28px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.2px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.25);
  }

  .date {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    margin-top: 5px;
  }

  /* 🔥 WEATHER BLOCK FINAL */
  .weather {
    display: flex;
    align-items: center;
    gap: 1px;
  }

  /* ICON */
  .weather-icon {
    font-size: 45px;
    line-height: 1;
  }


  /* TEXT RIGHT ALIGN */
  .weather-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: left;
    text-align: left;
  }

  .temp {
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.3px;
  }

  .city {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
  }

  @media (prefers-color-scheme: dark) {
    body {
      background: transparent !important;
      color: #ffffff;
    }
  }
</style>
</head>

<body>

<div class="hero">
  <div class="left">
    <div class="greeting" id="greeting"></div>
    <div class="date" id="date"></div>
  </div>

  <div class="weather">
    <div class="weather-icon" id="icon">🌤️</div>
    <div class="divider"></div>
    <div class="weather-info">
      <div class="temp" id="temp">--°C</div>
      <div class="city">Yannawa, Bangkok</div>
    </div>
  </div>
</div>

<script>
  const now = new Date();

  // Greeting
  let greeting = "Good Morning";
  const hour = now.getHours();

  if (hour >= 12 && hour < 17) greeting = "Good Afternoon";
  else if (hour >= 17) greeting = "Good Evening";

  document.getElementById("greeting").innerText = greeting;

  // Date
  const options = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
  document.getElementById("date").innerText = now.toLocaleDateString('en-GB', options);

  // Weather API
  fetch("https://api.open-meteo.com/v1/forecast?latitude=13.75&longitude=100.50&current_weather=true")
    .then(res => res.json())
    .then(data => {
      const temp = data.current_weather.temperature;
      const code = data.current_weather.weathercode;

      document.getElementById("temp").innerText = temp.toFixed(1) + "°C";

      // Icon logic
      let icon = "☀️";
      if (code >= 1 && code <= 3) icon = "🌤️";
      else if (code >= 45 && code <= 48) icon = "🌫️";
      else if (code >= 51 && code <= 67) icon = "🌧️";
      else if (code >= 71 && code <= 77) icon = "❄️";
      else if (code >= 80) icon = "⛈️";

      document.getElementById("icon").innerText = icon;
    })
    .catch(() => {
      document.getElementById("temp").innerText = "30.0°C";
    });
</script>

</body>
</html>
