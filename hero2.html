<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:16px;
    font-family:"Segoe UI Variable","Segoe UI",sans-serif;
    background:transparent;
}

/* APPLE GLASS WIDGET */
.hero{
    position:relative;
    display:flex;
    justify-content:space-between;
    align-items:center;

    min-height:120px;
    padding:20px 24px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:32px;

    overflow:hidden;
}

/* BLUE GLOW */
.hero::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        radial-gradient(
            circle at top left,
            rgba(120,200,255,.45),
            transparent 45%
        ),
        radial-gradient(
            circle at bottom right,
            rgba(40,90,255,.35),
            transparent 50%
        );

    z-index:0;
}

/* LIGHT SHINE */
.hero::after{
    content:"";
    position:absolute;

    top:-120px;
    left:-100px;

    width:320px;
    height:320px;

    border-radius:50%;

    background:rgba(255,255,255,.12);

    filter:blur(70px);

    z-index:0;
}

.left,
.weather{
    position:relative;
    z-index:1;
}

.greeting{
    color:white;
    font-size:32px;
    font-weight:600;
    text-shadow:0 1px 3px rgba(0,0,0,.15);
}

.date{
    margin-top:6px;
    color:rgba(255,255,255,.85);
    font-size:14px;
}

.weather{
    display:flex;
    align-items:center;
    gap:10px;
}

.weather-icon{
    font-size:48px;
}

.temp{
    color:white;
    font-size:22px;
    font-weight:700;
}

.city{
    color:rgba(255,255,255,.8);
    font-size:12px;
}
</style>
</head>

<body>

<div class="hero">

    <div class="left">
        <div class="greeting" id="greeting"></div>
        <div class="date" id="date"></div>
    </div>

    <div class="weather">
        <div class="weather-icon" id="icon">☀️</div>

        <div>
            <div class="temp" id="temp">--°C</div>
            <div class="city">Rama III, Bangkok</div>
        </div>
    </div>

</div>

<script>
const now = new Date();

/* Greeting */
let greeting = "Good Morning";

if(now.getHours() >= 12 && now.getHours() < 17){
    greeting = "Good Afternoon";
}
else if(now.getHours() >= 17){
    greeting = "Good Evening";
}

document.getElementById("greeting").textContent = greeting;

/* Date */
document.getElementById("date").textContent =
    now.toLocaleDateString("en-GB",{
        weekday:"long",
        day:"numeric",
        month:"long",
        year:"numeric"
    });

/* Weather */
fetch(
"https://api.open-meteo.com/v1/forecast?latitude=13.695995306563452&longitude=100.53757141212388&current=temperature_2m,weather_code"
)
.then(r=>r.json())
.then(data=>{

    const temp=data.current.temperature_2m;
    const code=data.current.weather_code;

    document.getElementById("temp").textContent=
        temp.toFixed(1)+"°C";

    let icon="☀️";

    if(code>=1&&code<=3)
        icon="🌤️";
    else if(code>=45&&code<=48)
        icon="🌫️";
    else if(code>=51&&code<=67)
        icon="🌧️";
    else if(code>=71&&code<=77)
        icon="❄️";
    else if(code>=80&&code<=82)
        icon="🌦️";
    else if(code>=95)
        icon="⛈️";

    document.getElementById("icon").textContent=icon;
})
.catch(()=>{
    document.getElementById("temp").textContent="--°C";
});
</script>

</body>
</html>
