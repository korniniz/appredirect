<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    padding:12px;
    font-family:"Segoe UI Variable","Segoe UI",sans-serif;
    background:transparent;
}

.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;

    min-height:10px;
    padding:20px 40px;

    background:#3E5F94;

    border-radius:32px;
}

.greeting{
    color:white;
    font-size:28px;
    font-weight:600;
}

.date{
    margin-top:6px;
    color:rgba(255,255,255,.85);
    font-size:14px;
}

.weather{
    display:flex;
    align-items:center;
    gap:8px;
}

.weather-icon{
    font-size:40px;
}

.temp{
    color:white;
    font-size:18px;
    font-weight:700;
}

.city{
    color:rgba(255,255,255,.75);
    font-size:12px;
}
</style>
</head>

<body>

<div class="hero">

    <div>
        <div class="greeting" id="greeting"></div>
        <div class="date" id="date"></div>
    </div>

    <div class="weather">
        <div class="weather-icon">☀️</div>

        <div>
            <div class="temp" id="temp">--°C</div>
            <div class="city">Yannawa, Bangkok</div>
        </div>
    </div>

</div>

<script>

const now = new Date();

let greeting = "Good Morning";

if(now.getHours() >= 12 && now.getHours() < 17)
    greeting = "Good Afternoon";
else if(now.getHours() >= 17)
    greeting = "Good Evening";

document.getElementById("greeting").textContent = greeting;

document.getElementById("date").textContent =
now.toLocaleDateString("en-GB",{
    weekday:"long",
    day:"numeric",
    month:"long",
    year:"numeric"
});

fetch("https://api.open-meteo.com/v1/forecast?latitude=13.695995306563452&longitude=100.53757141212388&current=temperature_2m")
.then(r=>r.json())
.then(data=>{
    document.getElementById("temp").textContent =
    data.current.temperature_2m.toFixed(1)+"°C";
});

</script>

</body>
</html>
