<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:16px;
    font-family:"Segoe UI Variable","Segoe UI",sans-serif;
    background:transparent;
}

/* NHC CORPORATE WIDGET */
.hero{
    position:relative;
    display:flex;
    justify-content:space-between;
    align-items:center;

    min-height:120px;
    padding:20px 24px;

    background:linear-gradient(
        135deg,
        #6B86B5 0%,
        #5574A7 25%,
        #3E5F94 60%,
        #2F4E82 100%
    );

    border-radius:32px;

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 12px 30px rgba(62,95,148,0.25),
        inset 0 1px 0 rgba(255,255,255,0.18);

    overflow:hidden;
}

/* LIGHT EFFECT */
.hero::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        radial-gradient(
            circle at top left,
            rgba(180,210,255,.28),
            transparent 45%
        ),
        radial-gradient(
            circle at bottom right,
            rgba(62,95,148,.40),
            transparent 55%
        );

    z-index:0;
}

/* APPLE STYLE SHINE */
.hero::after{
    content:"";
    position:absolute;

    top:-120px;
    left:-100px;

    width:320px;
    height:320px;

    border-radius:50%;

    background:rgba(255,255,255,.10);

    filter:blur(70px);

    z-index:0;
}

.left,
.weather{
    position:relative;
    z-index:1;
}

/* LEFT */
.greeting{
    color:#ffffff;
    font-size:32px;
    font-weight:600;
    line-height:1.1;
}

.date{
    margin-top:8px;
    color:rgba(255,255,255,.85);
    font-size:14px;
}

/* WEATHER */
.weather{
    display:flex;
    align-items:center;
    gap:10px;
}

.weather-icon{
    font-size:52px;
    line-height:1;
}

.weather-info{
    display:flex;
    flex-direction:column;
}

.temp{
    color:#ffffff;
    font-size:22px;
    font-weight:700;
    line-height:1.1;
}

.city{
    color:rgba(255,255,255,.80);
    font-size:12px;
}
</style>
</head>

<body>

<div class="hero">

    <div class="left">
        <div class="greeting" id="greeting"></div>
        <div class="date" id="date"></div>
    </div>

    <div class="weather">
        <div class="weather-icon" id="icon">☀️</div>

        <div class="weather-info">
            <div class="temp" id="temp">--°C</div>
            <div class="city">Rama III, Bangkok</div>
        </div>
    </div>

</div>

<script>

const now = new Date();

/* Greeting */
let greeting = "Good Morning";

if(now.getHours() >= 12 && now.getHours() < 17){
    greeting = "Good Afternoon";
}
else if(now.getHours() >= 17){
    greeting = "Good Evening";
}

document.getElementById("greeting").textContent = greeting;

/* Date */
document.getElementById("date").textContent =
    now.toLocaleDateString("en-GB",{
        weekday:"long",
        day:"numeric",
        month:"long",
        year:"numeric"
    });

/* Weather */
fetch(
"https://api.open-meteo.com/v1/forecast?latitude=13.695995306563452&longitude=100.53757141212388&current=temperature_2m,weather_code"
)
.then(response => response.json())
.then(data => {

    const temp = data.current.temperature_2m;
    const code = data.current.weather_code;

    document.getElementById("temp").textContent =
        temp.toFixed(1) + "°C";

    let icon = "☀️";

    if(code >= 1 && code <= 3)
        icon = "🌤️";
    else if(code >= 45 && code <= 48)
        icon = "🌫️";
    else if(code >= 51 && code <= 67)
        icon = "🌧️";
    else if(code >= 71 && code <= 77)
        icon = "❄️";
    else if(code >= 80 && code <= 82)
        icon = "🌦️";
    else if(code >= 95)
        icon = "⛈️";

    document.getElementById("icon").textContent = icon;
})
.catch(() => {
    document.getElementById("temp").textContent = "--°C";
});

</script>

</body>
</html>
