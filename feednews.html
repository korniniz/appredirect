<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: transparent;
    color: #ffffff;
  }

  .container {
    padding: 10px;
  }

  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .tab {
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 13px;
    background: rgba(255,255,255,0.1);
  }

  .tab.active {
    background: #0078d4;
  }

  .news-item {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    align-items: center;
  }

  .news-item img {
    width: 80px;
    height: 55px;
    object-fit: cover;
    border-radius: 6px;
    background: #333;
  }

  .news-item a {
    color: #ffffff;
    font-size: 13px;
    text-decoration: none;
  }

  .news-item a:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>

<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="loadTab('thai')">🇹🇭 Thai</div>
    <div class="tab" onclick="loadTab('world')">🌍 World</div>
    <div class="tab" onclick="loadTab('business')">💼 Business</div>
  </div>

  <div id="news">Loading...</div>
</div>

<script>
  const feeds = {
    thai: [
      "https://www.thaipbs.or.th/rss/news.xml",
      "https://www.thairath.co.th/rss/news"
    ],
    world: [
      "https://feeds.bbci.co.uk/news/world/rss.xml"
    ],
    business: [
      "https://feeds.bbci.co.uk/news/business/rss.xml"
    ]
  };

  const proxies = [
    "https://api.rss2json.com/v1/api.json?rss_url=",
    "https://api.allorigins.win/get?url="
  ];

  async function fetchRSS(rssUrl) {
    for (let proxy of proxies) {
      try {
        const res = await fetch(proxy + encodeURIComponent(rssUrl));
        const data = await res.json();

        if (data.items) return data.items;

        if (data.contents) {
          const parser = new DOMParser();
          const xml = parser.parseFromString(data.contents, "text/xml");
          return [...xml.querySelectorAll("item")].map(x => ({
            title: x.querySelector("title")?.textContent,
            link: x.querySelector("link")?.textContent,
            description: x.querySelector("description")?.textContent
          }));
        }

      } catch (e) {}
    }
    return [];
  }

  async function loadTab(type) {
    document.getElementById("news").innerText = "Loading...";

    // เปลี่ยน active tab
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");

    let allItems = [];

    // 🔥 Lazy load: โหลดเฉพาะ tab ที่กด
    for (let url of feeds[type]) {
      const items = await fetchRSS(url);
      allItems = allItems.concat(items);
    }

    render(allItems.slice(0,6));
  }

  function render(items) {
    let html = "";

    items.forEach(item => {
      let img = "";

      if (item.thumbnail) img = item.thumbnail;

      if (!img && item.description) {
        const match = item.description.match(/<img.*?src="(.*?)"/);
        if (match) img = match[1];
      }

      if (!img) {
        img = "https://via.placeholder.com/80x55?text=News";
      }

      html += `
        <div class="news-item">
          <img src="${img}">
          <a href="${item.link}" target="_blank">${item.title}</a>
        </div>
      `;
    });

    document.getElementById("news").innerHTML = html;
  }

  // โหลด default tab
  loadTab('thai');
</script>

</body>
</html>
