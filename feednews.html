<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: transparent;
    color: #ffffff;
  }

  .news-container {
    padding: 10px;
  }

  .title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .item {
    font-size: 13px;
    margin-bottom: 6px;
    opacity: 0.9;
  }

  .item a {
    color: #ffffff;
    text-decoration: none;
  }

  .item a:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>

<div class="news-container">
  <div class="title">📰 Latest News</div>
  <div id="news">Loading...</div>
</div>

<script>
  // 🔥 ใช้ RSS ที่เสถียร
  const rssFeed = "https://feeds.bbci.co.uk/news/world/rss.xml";

  // 🔥 ใช้ proxy ที่เสถียรกว่า
  const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssFeed);

  fetch(api)
    .then(res => res.json())
    .then(data => {
      let html = "";

      data.items.slice(0,5).forEach(item => {
        html += `<div class="item">• <a href="${item.link}" target="_blank">${item.title}</a></div>`;
      });

      document.getElementById("news").innerHTML = html;
    })
    .catch(err => {
      document.getElementById("news").innerText = "Unable to load news.";
    });
</script>

</body>
</html>
