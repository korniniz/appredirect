<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: transparent;
    color: #ffffff;
  }

  .container {
    padding: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .card {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
    backdrop-filter: blur(6px);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }

  .card img {
    width: 100%;
    height: 130px;
    object-fit: cover;
  }

  .card-body {
    padding: 8px;
  }

  .card-title {
    font-size: 13px;
    line-height: 1.4;
    color: #ffffff;
    text-decoration: none;
    display: block;
  }

  .card-title:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>

<div class="container">
  <div id="news" class="grid">Loading...</div>
</div>

<script>
  const feed = "https://feeds.bbci.co.uk/news/world/rss.xml";
  const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed);

  async function loadNews() {
    try {
      const res = await fetch(api);
      const data = await res.json();

      let html = "";

      data.items.slice(0, 6).forEach(item => {
        const img = item.thumbnail || "https://via.placeholder.com/300x200?text=News";

        html += `
          <div class="card">
            <img src="${img}">
            <div class="card-body">
              <a href="${item.link}" target="_blank" class="card-title">
                ${item.title}
              </a>
            </div>
          </div>
        `;
      });

      document.getElementById("news").innerHTML = html;

    } catch (err) {
      document.getElementById("news").innerText = "Unable to load news";
    }
  }

  loadNews();
</script>

</body>
</html>
