<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Launching Outlook…</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Segoe UI", sans-serif;
    background: #0b1220;
    color: #fff;
  }
  .box {
    text-align: center;
    opacity: 0.85;
  }
</style>
</head>

<body>
  <div class="box">
    <div>Opening Outlook...</div>
    <div style="font-size:12px;opacity:.6;margin-top:6px;">
      If nothing happens, Outlook may not be installed or browser blocked it.
    </div>
  </div>

<script>
  function openOutlook() {
    const ua = navigator.userAgent.toLowerCase();

    // Detect OS
    const isMac = ua.includes("mac");
    const isWindows = ua.includes("win");

    try {
      if (isWindows) {
        // New Outlook Windows
        window.location.href = "ms-outlook://";
      } else if (isMac) {
        // Mac Outlook
        window.location.href = "ms-outlook://"; 
        // fallback mac protocol (บางเครื่องใช้ตัวนี้)
        setTimeout(() => {
          window.location.href = "outlook://";
        }, 200);
      } else {
        // Other OS → do nothing
        console.log("Unsupported OS");
      }
    } catch (e) {
      console.log("Launch failed", e);
    }
  }

  // 🔥 Run immediately when page loads
  window.onload = function () {
    openOutlook();
  };
</script>

</body>
</html>
